  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n  <section style=\"position:relative;\">\n    <div style=\"position:absolute; inset:0; background-image:repeating-linear-gradient(115deg, transparent 0 38px, var(--accent) 38px 40px); opacity:.05; pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative; max-width:1200px; margin:0 auto; padding:72px 28px 84px;\">\n      <div style=\"display:inline-flex; align-items:center; gap:9px; font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); margin-bottom:18px;\">\n        <span style=\"width:26px; height:2px; background:var(--accent); display:inline-block;\"><\u002Fspan>\n        Get In Touch\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Saira Condensed',sans-serif; font-weight:900; font-size:clamp(44px,6vw,78px); line-height:.92; text-transform:uppercase; letter-spacing:-.01em; max-width:760px;\">Let's get your tires<br>under control.<\u002Fh1>\n      <p style=\"margin-top:20px; max-width:520px; font-size:18px; line-height:1.55; color:var(--muted);\">Questions about the app, a demo for your track or series, or help with the race-day checklists? Drop us a line — we're racers too, so we get it.<\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:.85fr 1.15fr; gap:34px; margin-top:50px; align-items:start;\">\n\n        <!-- CONTACT METHODS -->\n        <div style=\"display:flex; flex-direction:column; gap:14px;\">\n          <a href=\"mailto:contact@t3tireapp.com\" class=\"t3hov\" style=\"display:flex; align-items:center; gap:16px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:20px;\" style-hover=\"border-color:var(--accent); transform:translateY(-2px);\">\n            <span style=\"width:46px; height:46px; flex:0 0 auto; border-radius:11px; background:var(--accent); color:var(--accent-ink); display:flex; align-items:center; justify-content:center; font-family:'Saira Condensed',sans-serif; font-weight:900; font-size:22px;\">@<\u002Fspan>\n            <span>\n              <span style=\"display:block; font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);\">Email Us<\u002Fspan>\n              <span style=\"display:block; font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:21px; text-transform:uppercase;\">contact@t3tireapp.com<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://www.facebook.com/101101086238131\" class=\"t3hov\" style=\"display:flex; align-items:center; gap:16px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:20px;\" style-hover=\"border-color:var(--accent); transform:translateY(-2px);\">\n            <span style=\"width:46px; height:46px; flex:0 0 auto; border-radius:11px; background:var(--surface2); color:var(--accent); display:flex; align-items:center; justify-content:center; font-family:'Saira Condensed',sans-serif; font-weight:900; font-size:22px;\">f<\u002Fspan>\n            <span>\n              <span style=\"display:block; font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);\">Facebook<\u002Fspan>\n              <span style=\"display:block; font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:21px; text-transform:uppercase;\">Message us<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://www.instagram.com/\" class=\"t3hov\" style=\"display:flex; align-items:center; gap:16px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:20px;\" style-hover=\"border-color:var(--accent); transform:translateY(-2px);\">\n            <span style=\"width:46px; height:46px; flex:0 0 auto; border-radius:11px; background:var(--surface2); color:var(--accent); display:flex; align-items:center; justify-content:center; font-family:'Saira Condensed',sans-serif; font-weight:900; font-size:18px;\">IG<\u002Fspan>\n            <span>\n              <span style=\"display:block; font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);\">Instagram<\u002Fspan>\n              <span style=\"display:block; font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:21px; text-transform:uppercase;\">Follow along<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fa>\n          <div style=\"background:var(--surface2); border:1px dashed var(--line); border-radius:14px; padding:20px;\">\n            <span style=\"display:block; font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:6px;\">▰ Catch us in person<\u002Fspan>\n            <span style=\"display:block; font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:20px; text-transform:uppercase; line-height:1.05;\">RPM — Daytona Beach, FL<\u002Fspan>\n            <span style=\"display:block; color:var(--muted); font-size:14px; margin-top:3px;\">February 12–13, 2026<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- FORM -->\n        <div style=\"background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:30px; box-shadow:0 24px 60px rgba(0,0,0,.4);\">\n          <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:40px 10px; text-align:center;\">\n              <div style=\"font-family:'Saira Condensed',sans-serif; font-weight:900; font-size:30px; color:var(--accent); text-transform:uppercase;\">Your email is ready to send<\u002Fdiv>\n              <p style=\"color:var(--muted); margin-top:12px; font-size:15.5px; line-height:1.55;\">We opened your email app with the message filled in. Just hit send and we'll get back to you. Didn't open? Email us directly at <span style=\"color:#F6F1E9;\">contact@t3tireapp.com<\u002Fspan>.<\u002Fp>\n              <button onclick=\"{{ reset }}\" class=\"t3hov\" style=\"margin-top:22px; background:transparent; border:1.5px solid var(--line); color:#F6F1E9; font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:13px 24px; border-radius:10px; cursor:pointer;\" style-hover=\"border-color:#F6F1E9;\">Write another<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n            <div>\n              <div style=\"font-family:'Saira Condensed',sans-serif; font-weight:800; font-size:24px; text-transform:uppercase; margin-bottom:20px;\">Send a message<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:14px;\">\n                <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n                  <input class=\"t3field\" placeholder=\"Your name\" value=\"{{ name }}\" oninput=\"{{ setName }}\">\n                  <input class=\"t3field\" type=\"email\" placeholder=\"Your email\" value=\"{{ email }}\" oninput=\"{{ setEmail }}\">\n                <\u002Fdiv>\n                <select class=\"t3field\" value=\"{{ role }}\" onchange=\"{{ setRole }}\" style=\"cursor:pointer;\">\n                  <option value=\"\">I'm reaching out as…<\u002Foption>\n                  <option value=\"Track or Series\">A track or series<\u002Foption>\n                  <option value=\"Racer or Team\">A racer or team<\u002Foption>\n                  <option value=\"Checklist Customer\">A checklist customer<\u002Foption>\n                  <option value=\"Other\">Something else<\u002Foption>\n                <\u002Fselect>\n                <textarea class=\"t3field\" placeholder=\"What can we help with?\" rows=\"5\" value=\"{{ message }}\" oninput=\"{{ setMessage }}\" style=\"resize:vertical;\"><\u002Ftextarea>\n                <button onclick=\"{{ submit }}\" class=\"t3hov\" style=\"background:var(--accent); color:var(--accent-ink); font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:.04em; text-transform:uppercase; padding:16px; border-radius:11px; border:none; cursor:pointer; box-shadow:0 10px 26px var(--accent-glow);\" style-hover=\"transform:translateY(-2px);\">Send Message →<\u002Fbutton>\n                <p style=\"text-align:center; color:var(--muted); font-size:12.5px;\">Opens your email app with everything filled in — nothing is stored on this site.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:var(--ink); border-top:1px solid var(--line);\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:40px 28px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:18px;\">\n      <span style=\"display:inline-flex; align-items:center; background:#F6F1E9; padding:8px 13px; border-radius:9px;\">\n        <img src=\"aa692bf2-0e09-4e34-ba26-ea3b6cb9663e\" alt=\"T3 TireApp\" style=\"height:34px; display:block;\">\n      <\u002Fspan>\n      <span style=\"color:var(--muted); font-size:13px;\">© 2026 T3 TireApp. Scan tires in seconds. Enforce them all night.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { name:\"\", email:\"\", role:\"\", message:\"\", sent:false };\n\n  setName = (e) => this.setState({ name: e.target.value });\n  setEmail = (e) => this.setState({ email: e.target.value });\n  setRole = (e) => this.setState({ role: e.target.value });\n  setMessage = (e) => this.setState({ message: e.target.value });\n  reset = () => this.setState({ sent:false, name:\"\", email:\"\", role:\"\", message:\"\" });\n\n  submit = () => {\n    const { name, email, role, message } = this.state;\n    const subject = \"Website inquiry\" + (role ? \" — \" + role : \"\");\n    const body =\n      \"Name: \" + (name || \"\") + \"\\n\" +\n      \"Email: \" + (email || \"\") + \"\\n\" +\n      \"Type: \" + (role || \"\") + \"\\n\\n\" +\n      (message || \"\");\n    window.location.href = \"mailto:contact@t3tireapp.com?subject=\" +\n      encodeURIComponent(subject) + \"&body=\" + encodeURIComponent(body);\n    this.setState({ sent:true });\n  };\n\n  renderVals() {\n    return {\n      name: this.state.name,\n      email: this.state.email,\n      role: this.state.role,\n      message: this.state.message,\n      sent: this.state.sent,\n      notSent: !this.state.sent,\n      setName: this.setName,\n      setEmail: this.setEmail,\n      setRole: this.setRole,\n      setMessage: this.setMessage,\n      submit: this.submit,\n      reset: this.reset\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
